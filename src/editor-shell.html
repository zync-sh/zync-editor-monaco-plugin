<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Zync Monaco Editor</title>
    <style>
      html,
      body,
      #editor-root {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0f111a;
      }
      #boot-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #94a3b8;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        font-size: 12px;
        letter-spacing: 0.02em;
        background: #0f111a;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div id="boot-loading" role="status" aria-live="polite" aria-busy="true">Loading Monaco editor…</div>
    <noscript>
      Monaco editor requires JavaScript to run. Please enable JavaScript and reopen this file.
    </noscript>
    <div id="editor-root"></div>
    <!-- __BOOTSTRAP__ -->
  </body>
</html>
